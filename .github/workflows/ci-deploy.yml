name: Build and deploy CyberMorph

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: cybermorph-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-web:
    name: Test and build web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: cybermorph-web
          path: apps/studio/dist
          if-no-files-found: error

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Set rolling desktop version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $version = "0.2.${{ github.run_number }}"
          }
          npm version $version --no-git-tag-version --workspace @cybermorph/desktop
          "CYBERMORPH_VERSION=$version" >> $env:GITHUB_ENV
      - run: npm run dist:win
      - name: Normalize installer filename
        shell: pwsh
        run: |
          $installer = Get-ChildItem apps/desktop/release/CyberMorph-Setup-*.exe | Select-Object -First 1
          if (-not $installer) { throw "Windows installer was not generated" }
          Copy-Item $installer.FullName apps/desktop/release/CyberMorph-Setup.exe
      - uses: actions/upload-artifact@v4
        with:
          name: cybermorph-windows
          path: |
            apps/desktop/release/latest.yml
            apps/desktop/release/CyberMorph-Setup-*.exe
            apps/desktop/release/CyberMorph-Setup-*.exe.blockmap
            apps/desktop/release/CyberMorph-Setup.exe
          if-no-files-found: error

  publish-desktop-update:
    name: Publish rolling desktop update
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cybermorph-windows
          path: release
      - name: Replace rolling update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view desktop-latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release delete desktop-latest --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes
          fi
          gh release create desktop-latest release/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "CyberMorph Desktop Update" \
            --notes "Canal automático de actualización para CyberMorph Studio." \
            --prerelease

  deploy-production:
    name: Deploy directly to production
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: [test-web, build-windows, publish-desktop-update]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://davefrassoni.com/cybermorph/
    env:
      VPS_HOST: ${{ vars.VPS_HOST || secrets.VPS_HOST }}
      VPS_PORT: ${{ vars.VPS_PORT || secrets.VPS_PORT }}
      VPS_USER: ${{ vars.VPS_USER || secrets.VPS_USER }}
      VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH || secrets.VPS_DEPLOY_PATH }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cybermorph-web
          path: artifacts/web
      - uses: actions/download-artifact@v4
        with:
          name: cybermorph-windows
          path: artifacts/windows
      - name: Configure verified SSH access
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_PORT"
          test -n "$VPS_USER"
          test -n "$VPS_DEPLOY_PATH"
          test -n "$VPS_SSH_PRIVATE_KEY"
          test -n "$VPS_KNOWN_HOSTS"
          [[ "$VPS_PORT" =~ ^[0-9]{1,5}$ ]]
          [[ "$VPS_USER" =~ ^[A-Za-z_][A-Za-z0-9_-]*$ ]]
          [[ "$VPS_HOST" =~ ^[A-Za-z0-9.-]+$ ]]
          [[ "$VPS_DEPLOY_PATH" =~ ^/var/www/[A-Za-z0-9._/-]+$ ]]
          install -d -m 0700 "$HOME/.ssh"
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" | tr -d '\r' > "$HOME/.ssh/deploy_key"
          printf '%s\n' "$VPS_KNOWN_HOSTS" | tr -d '\r' > "$HOME/.ssh/known_hosts"
          chmod 0600 "$HOME/.ssh/deploy_key"
          chmod 0644 "$HOME/.ssh/known_hosts"
      - name: Upload verified artifacts
        run: |
          remote="$VPS_USER@$VPS_HOST"
          staging="/tmp/cybermorph-deploy-$GITHUB_SHA"
          ssh -p "$VPS_PORT" -i "$HOME/.ssh/deploy_key" "$remote" \
            "rm -rf '$staging' && mkdir -p '$staging/web' '$staging/windows'"
          rsync -az --delete \
            -e "ssh -p $VPS_PORT -i $HOME/.ssh/deploy_key" \
            artifacts/web/ "$remote:$staging/web/"
          rsync -az --delete \
            -e "ssh -p $VPS_PORT -i $HOME/.ssh/deploy_key" \
            artifacts/windows/ "$remote:$staging/windows/"
          rsync -az \
            -e "ssh -p $VPS_PORT -i $HOME/.ssh/deploy_key" \
            deploy/deploy-artifacts.sh "$remote:$staging/deploy-artifacts.sh"
          ssh -p "$VPS_PORT" -i "$HOME/.ssh/deploy_key" "$remote" \
            "bash '$staging/deploy-artifacts.sh' '$VPS_DEPLOY_PATH' '$GITHUB_SHA' '$staging'"

  release:
    name: Publish tagged release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test-web, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cybermorph-windows
          path: release
      - uses: softprops/action-gh-release@v2
        with:
          files: release/CyberMorph-Setup.exe
          generate_release_notes: true
